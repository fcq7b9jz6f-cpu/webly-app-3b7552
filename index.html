<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>موقع أم كلثوم</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;700&display=swap');

:root {
  --primary-gold: #c5a059;
  --dark-burgundy: #4a0404;
  --cream: #fffdf2;
  --soft-black: #1a1a1a;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Tajawal', sans-serif;
  background-color: var(--cream);
  color: var(--soft-black);
  direction: rtl;
  line-height: 1.8;
}

h1, h2, h3 {
  font-family: 'Amiri', serif;
}

.container {
  max-width: 100%;
}

.section {
  padding: 80px 10%;
}

/* Hero Section */
.hero {
  height: 90vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&q=80') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  position: relative;
}

.hero-content h1 {
  font-size: 5rem;
  margin-bottom: 0px;
  color: var(--primary-gold);
}

.subtitle {
  font-size: 1.8rem;
  font-style: italic;
  margin-top: 10px;
}

.divider {
  width: 100px;
  height: 3px;
  background-color: var(--primary-gold);
  margin: 20px auto;
}

/* Titles */
.title-gold {
  font-size: 3rem;
  color: var(--dark-burgundy);
  text-align: center;
  margin-bottom: 50px;
  border-bottom: 2px solid var(--primary-gold);
  display: inline-block;
  left: 50%;
  position: relative;
  transform: translateX(-50%);
}

/* Biography */
.bio-content p {
  font-size: 1.2rem;
  margin-bottom: 25px;
  text-align: justify;
}

/* Timeline */
.timeline-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.timeline-item {
  background: white;
  padding: 20px;
  border-right: 5px solid var(--primary-gold);
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  transition: transform 0.3s;
}

.timeline-item:hover {
  transform: translateY(-5px);
}

.year {
  font-weight: bold;
  font-size: 1.4rem;
  color: var(--dark-burgundy);
  display: block;
}

/* Songs Grid */
.songs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 30px;
}

.song-card {
  background: var(--dark-burgundy);
  color: var(--primary-gold);
  padding: 30px;
  border-radius: 2px;
  text-align: center;
  border: 1px solid var(--primary-gold);
  transition: all 0.3s;
}

.song-card:hover {
  background: var(--primary-gold);
  color: var(--dark-burgundy);
}

.song-card h3 {
  font-size: 2rem;
  margin-bottom: 15px;
}

/* Legacy */
.quote-box {
  background: rgba(197, 160, 89, 0.1);
  padding: 40px;
  border-right: 10px solid var(--dark-burgundy);
  margin-bottom: 40px;
  font-style: italic;
}

blockquote {
  font-family: 'Amiri', serif;
  font-size: 1.5rem;
  margin: 0;
}

/* Footer */
.footer {
  background: var(--dark-burgundy);
  color: var(--cream);
  text-align: center;
  padding: 40px;
  margin-top: 50px;
}

@media (max-width: 768px) {
  .hero-content h1 { font-size: 3rem; }
  .section { padding: 40px 5%; }
}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
import React from "react";
import Hero from "./Hero";
import Biography from "./Biography";
import Timeline from "./Timeline";
import Songs from "./Songs";
import Legacy from "./Legacy";
import Footer from "./Footer";
import "./styles.css";

var App = function App() {
  return (
    <div className="container">
      <Hero />
      <Biography />
      <Timeline />
      <Songs />
      <Legacy />
      <Footer />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
