<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>موقع أم كلثوم</title>
<meta name="description" content="موقع أم كلثوم — موقع منشور بواسطة Webly" />
<style>
  * { box-sizing: border-box; }
  html, body, #root { min-height: 100%; margin: 0; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Cairo, Tahoma, sans-serif; }
  .webly-fallback { min-height: 100vh; display: grid; place-items: center; padding: 32px; text-align: center; }
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;700&display=swap');

:root {
  --primary-gold: #c5a059;
  --dark-burgundy: #4a0404;
  --cream: #fffdf2;
  --soft-black: #1a1a1a;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Tajawal', sans-serif;
  background-color: var(--cream);
  color: var(--soft-black);
  direction: rtl;
  line-height: 1.8;
}

h1, h2, h3 {
  font-family: 'Amiri', serif;
}

.container {
  max-width: 100%;
}

.section {
  padding: 80px 10%;
}

/* Hero Section */
.hero {
  height: 90vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&q=80') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  position: relative;
}

.hero-content h1 {
  font-size: 5rem;
  margin-bottom: 0px;
  color: var(--primary-gold);
}

.subtitle {
  font-size: 1.8rem;
  font-style: italic;
  margin-top: 10px;
}

.divider {
  width: 100px;
  height: 3px;
  background-color: var(--primary-gold);
  margin: 20px auto;
}

/* Titles */
.title-gold {
  font-size: 3rem;
  color: var(--dark-burgundy);
  text-align: center;
  margin-bottom: 50px;
  border-bottom: 2px solid var(--primary-gold);
  display: inline-block;
  left: 50%;
  position: relative;
  transform: translateX(-50%);
}

/* Biography */
.bio-content p {
  font-size: 1.2rem;
  margin-bottom: 25px;
  text-align: justify;
}

/* Timeline */
.timeline-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.timeline-item {
  background: white;
  padding: 20px;
  border-right: 5px solid var(--primary-gold);
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  transition: transform 0.3s;
}

.timeline-item:hover {
  transform: translateY(-5px);
}

.year {
  font-weight: bold;
  font-size: 1.4rem;
  color: var(--dark-burgundy);
  display: block;
}

/* Songs Grid */
.songs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 30px;
}

.song-card {
  background: var(--dark-burgundy);
  color: var(--primary-gold);
  padding: 30px;
  border-radius: 2px;
  text-align: center;
  border: 1px solid var(--primary-gold);
  transition: all 0.3s;
}

.song-card:hover {
  background: var(--primary-gold);
  color: var(--dark-burgundy);
}

.song-card h3 {
  font-size: 2rem;
  margin-bottom: 15px;
}

/* Legacy */
.quote-box {
  background: rgba(197, 160, 89, 0.1);
  padding: 40px;
  border-right: 10px solid var(--dark-burgundy);
  margin-bottom: 40px;
  font-style: italic;
}

blockquote {
  font-family: 'Amiri', serif;
  font-size: 1.5rem;
  margin: 0;
}

/* Footer */
.footer {
  background: var(--dark-burgundy);
  color: var(--cream);
  text-align: center;
  padding: 40px;
  margin-top: 50px;
}

@media (max-width: 768px) {
  .hero-content h1 { font-size: 3rem; }
  .section { padding: 40px 5%; }
}

</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"><main class="webly-fallback">جارٍ تحميل الموقع...</main></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback, useReducer, useContext, createContext, Fragment } = React;

function Hero() {
  return (
    <div className="hero">
      <div className="hero-overlay"></div>
      <div className="hero-content">
        <h1>أم كلثوم</h1>
        <p className="subtitle">سيدة الغناء العربي وكوكب الشرق</p>
        <div className="divider"></div>
        <p className="brief">صوتٌ تشكّل من طين الأرض المصرية، ليُصبح أيقونة خالدة في وجدان العرب.</p>
      </div>
    </div>
  );
}


function Biography() {
  return (
    <section className="section bio-section">
      <h2 className="title-gold">رحلة من طماي الزهايرة</h2>
      <div className="bio-content">
        <p>
          ولدت فاطمة إبراهيم السيد البلتاجي، التي عُرفت لاحقاً باسم "أم كلثوم"، في قرية طماي الزهايرة بمحافظة الدقهلية. نشأت في أسرة ريفية بسيطة، وكان والدها إماماً للمسجد، وهو الذي اكتشف موهبتها الفطرية حينما كانت تستمع إليه وهو يعلم شقيقها الإنشاد، فبدأت تقلد ما تسمع بصوت يفيض عذوبة وقوة.
        </p>
        <p>
          كانت بداياتها الفنية بزي صبي، حيث كان والدها يلبسها العقال والقفطان لتنشد معه في الموالد والقرى المحيطة. هاتفها القدر حين التقت بالشيخ أبو العلا محمد والموسيقار زكريا أحمد، اللذين أقنعا والدها بضرورة الانتقال إلى القاهرة عام 1923، لتبدأ الفتاة الريفية رحلة التحول من منشدة قرى إلى "الهرم الرابع" لمصر.
        </p>
        <p>
          في القاهرة، صقلت موهبتها وتتلمذت على يد كبار الملحنين، واهتمت بتثقيف نفسها أدبياً وشعرياً، مما جعلها تختار كلمات أغانيها من عيون الشعر العربي، فاتصلت بأمير الشعراء أحمد شوقي، وبدأت حفلاتها الغنائية الشهرية التي كانت توقف حركة المرور في عواصم العرب من المحيط إلى الخليج.
        </p>
      </div>
    </section>
  );
}


const milstones = [
  { year: "1898", event: "الميلاد في طماي الزهايرة (التاريخ المرجح)." },
  { year: "1923", event: "الانتقال النهائي إلى القاهرة وبداية الاحتراف." },
  { year: "1926", event: "تأسيس أول تخت موسيقي خاص بها بدلاً من البطانة." },
  { year: "1934", event: "افتتاح الإذاعة المصرية بصوتها كأول فنانة تغني فيها." },
  { year: "1944", event: "تكريم الملك فاروق لها بمنحها وسام الكمال." },
  { year: "1954", event: "الزواج من الدكتور حسن الحفناوي." },
  { year: "1964", event: "لقاء السحاب لأول مرة مع محمد عبد الوهاب في 'إنت عمري'." },
  { year: "1967", event: "بدء جولاتها العالمية لدعم المجهود الحربي بعد النكسة." },
  { year: "1973", event: "تسجيل آخر أغانيها 'حكم علينا الهوى'." },
  { year: "1975", event: "رحيل الهرم الرابع عن عالمنا وحزن عميق في أرجاء الوطن العربي." }
];

function Timeline() {
  return (
    <section className="section timeline-section">
      <h2 className="title-gold">محطات في حياة الكوكب</h2>
      <div className="timeline-grid">
        {milstones.map((item, index) => (
          <div key={index} className="timeline-item">
            <span className="year">{item.year}</span>
            <p>{item.event}</p>
          </div>
        ))}
      </div>
    </section>
  );
}


const songs = [
  { title: "إنت عمري", poet: "أحمد شفيق كامل", composer: "محمد عبد الوهاب" },
  { title: "الأطلال", poet: "إبراهيم ناجي", composer: "رياض السنباطي" },
  { title: "ألف ليلة وليلة", poet: "مرسي جميل عزيز", composer: "بليغ حمدي" },
  { title: "أمل حياتي", poet: "أحمد شفيق كامل", composer: "محمد عبد الوهاب" },
  { title: "سيرة الحب", poet: "مرسي جميل عزيز", composer: "بليغ حمدي" },
  { title: "فات الميعاد", poet: "مرسي جميل عزيز", composer: "بليغ حمدي" }
];

function Songs() {
  return (
    <section className="section songs-section">
      <h2 className="title-gold">أيقونات غنائية</h2>
      <div className="songs-grid">
        {songs.map((song, index) => (
          <div key={index} className="song-card">
            <h3>{song.title}</h3>
            <p>كلمات: {song.poet}</p>
            <p>ألحان: {song.composer}</p>
          </div>
        ))}
      </div>
    </section>
  );
}


function Legacy() {
  return (
    <section className="section legacy-section">
      <h2 className="title-gold">الإرث والخلود</h2>
      <div className="quote-box">
        <blockquote>
          "ثُم تَمُرّ الأَيَّام، وتَبقى أُم كُلثُوم هِي الصَّوت الذي لَا يُهرم، والمَدرسة التي يَتعلّم مِنهَا العُشّاق كَيفَ يَكُون الحُب، وتَتعلّم مِنهَا الشُّعوب كَيفَ يَكُون الانتماء."
        </blockquote>
      </div>
      <div className="legacy-text">
        <p>
          رحلت أم كلثوم بجسدها في 3 فبراير 1975، وشيع جنازتها الملايين في مشهد مهيب لم تشهده مصر إلا في جنازة جمال عبد الناصر. لم تكن مجرد مغنية، بل كانت رمزاً وطنياً وقوة ناعمة جابت العالم لترمم جراح وطنها بصوتها.
        </p>
      </div>
    </section>
  );
}


function Footer() {
  return (
    <footer className="footer">
      <p>جميع الحقوق محفوظة - تكريماً لذكرى سيدة الغناء العربي</p>
      <p>© ٢٠٢٤ موقع أم كلثوم التعليمي</p>
    </footer>
  );
}









function App() {
  return (
    <div className="container">
      <Hero />
      <Biography />
      <Timeline />
      <Songs />
      <Legacy />
      <Footer />
    </div>
  );
}

try {
  const rootElement = document.getElementById('root');
  if (!rootElement) throw new Error('Missing #root element');
  if (typeof App !== 'function' && typeof App !== 'object') throw new Error('App component was not exported correctly');
  ReactDOM.createRoot(rootElement).render(React.createElement(App));
} catch (error) {
  document.getElementById('root').innerHTML = '<pre class="webly-fallback" dir="ltr" style="white-space:pre-wrap;color:#b91c1c">' + (error && error.stack ? error.stack : error) + '</pre>';
}
</script>
</body>
</html>
